    <section class="contact">
        
        <div class="container">
           <h2>Contact Me</h2>
           
           <div class="contact__main">
                <form action="">
                    <div class="contact__form-group">
                        <label>Name:</label>
                        <input type="text" name="name" placeholder="enter your name...">
                    </div>
                    <div class="contact__form-group">
                        <label>Email:</label>
                        <input type="email" name="email" placeholder="something12@gmail.com">
                    </div>
                    <div class="contact__form-group">
                        <label>Message:</label>
                        <textarea name="message" placeholder="write your message..."></textarea>
                    </div>
                    <button type="submit" class="contact__button">Send Message</button>
                </form>

                <div class="contact__side">
                    <h3>Get In Touch</h3>
                    <p><span>Location:</span> Dharan, Nepal</p>
                    <p><span>Degree:</span> BSc CSIT · 5th Semester</p>
                    <p><span>Looking for:</span> Web Dev opportunities in Nepal</p>
                    <p><span>Email:</span> nishan@email.com</p>
                </div>
           </div>
            
        </div>
    </section>
